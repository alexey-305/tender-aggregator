services:
  postgres:
    image: postgres:16
    container_name: tender_postgres
    restart: always
    environment:
      POSTGRES_USER: tender
      POSTGRES_PASSWORD: tender_password
      POSTGRES_DB: tender_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tender_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: