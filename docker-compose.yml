services:
  postgres:
    image: postgres:16
    container_name: tender_postgres
    environment:
      POSTGRES_USER: tender
      POSTGRES_PASSWORD: tender
      POSTGRES_DB: tender_aggregator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tender"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tender_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: tender_opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=TenderOS2026!
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data

  api:
    build: .
    container_name: tender_api
    env_file: .env
    environment:
      - database_url=postgresql+asyncpg://tender:tender@postgres:5432/tender_aggregator
      - celery_broker_url=redis://redis:6379/0
      - celery_result_backend=redis://redis:6379/1
      - opensearch_host=opensearch
      - opensearch_port=9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: tender_celery
    env_file: .env
    environment:
      - database_url=postgresql+asyncpg://tender:tender@postgres:5432/tender_aggregator
      - celery_broker_url=redis://redis:6379/0
      - celery_result_backend=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/code/app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  celery_beat:
    build: .
    container_name: tender_beat
    env_file: .env
    environment:
      - database_url=postgresql+asyncpg://tender:tender@postgres:5432/tender_aggregator
      - celery_broker_url=redis://redis:6379/0
      - celery_result_backend=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/code/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  pgdata:
  osdata: